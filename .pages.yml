title: Carmel Construction CMS
description: מערכת ניהול תוכן לאתר כרמל בנייה ותשתיות

media: images/uploads

pages:
  - title: עמוד הבית
    path: _data/pages/home.yml
    fields:
      - name: hero_title
        label: כותרת ראשית
        type: string
      - name: hero_subtitle
        label: כותרת משנה
        type: string
      - name: hero_description
        label: תיאור
        type: text
      - name: cta_text
        label: טקסט כפתור
        type: string

  - title: דף אודות
    path: _data/pages/about.yml
    fields:
      - name: title
        label: כותרת
        type: string
      - name: subtitle
        label: כותרת משנה
        type: string
      - name: story_title
        label: כותרת סיפור
        type: string
      - name: content
        label: תוכן
        type: text

  - title: דף צור קשר
    path: _data/pages/contact.yml
    fields:
      - name: title
        label: כותרת
        type: string
      - name: subtitle
        label: כותרת משנה
        type: string
      - name: address
        label: כתובת
        type: string
      - name: phone_main
        label: טלפון משרד
        type: string
      - name: phone_mobile
        label: נייד
        type: string
      - name: email_main
        label: אימייל ראשי
        type: string
      - name: email_projects
        label: אימייל פרויקטים
        type: string
      - name: hours
        label: שעות פעילות
        type: string

collections:
  - title: פרויקטים
    name: projects
    path: _projects
    fields:
      - name: title
        label: שם הפרויקט
        type: string
      - name: category
        label: קטגוריה
        type: select
        options:
          - infrastructure
          - towers
          - residential
          - industrial
      - name: description
        label: תיאור
        type: text
      - name: image
        label: תמונה
        type: image
      - name: status
        label: סטטוס
        type: select
        options:
          - in-progress
          - completed
      - name: date
        label: תאריך
        type: date
      - name: location
        label: מיקום
        type: string

  - title: צוות
    name: team
    path: _team
    fields:
      - name: name
        label: שם
        type: string
      - name: role
        label: תפקיד
        type: string
      - name: description
        label: תיאור
        type: text
      - name: image
        label: תמונה
        type: image
      - name: email
        label: אימייל
        type: string
      - name: phone
        label: טלפון
        type: string
      - name: order
        label: סדר תצוגה
        type: number
