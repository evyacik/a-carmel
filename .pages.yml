# Pages CMS Configuration
media: images/uploads

# Single page files
pages:
  - name: home
    label: Home Page
    file: _data/pages/home.yml
    fields:
      - {name: hero_title, label: Hero Title, widget: string}
      - {name: hero_subtitle, label: Hero Subtitle, widget: string}
      - {name: hero_description, label: Description, widget: text}
      - {name: cta_text, label: Button Text, widget: string}

  - name: about
    label: About Page
    file: _data/pages/about.yml
    fields:
      - {name: title, label: Title, widget: string}
      - {name: subtitle, label: Subtitle, widget: string}
      - {name: story_title, label: Story Title, widget: string}
      - {name: content, label: Content, widget: text}

  - name: contact
    label: Contact Page
    file: _data/pages/contact.yml
    fields:
      - {name: title, label: Title, widget: string}
      - {name: subtitle, label: Subtitle, widget: string}
      - {name: address, label: Address, widget: text}
      - {name: phone_main, label: Phone, widget: string}
      - {name: phone_mobile, label: Mobile, widget: string}
      - {name: email_main, label: Email, widget: string}
      - {name: hours, label: Hours, widget: string}

# Content collections
collections:
  - name: projects
    label: Projects
    folder: _projects
    create: true
    fields:
      - {name: title, label: Title, widget: string}
      - {name: category, label: Category, widget: string}
      - {name: description, label: Description, widget: text}
      - {name: image, label: Image, widget: image, required: false}
      - {name: status, label: Status, widget: string}
      - {name: date, label: Date, widget: datetime}
      - {name: location, label: Location, widget: string, required: false}

  - name: team
    label: Team
    folder: _team
    create: true
    fields:
      - {name: name, label: Name, widget: string}
      - {name: role, label: Role, widget: string}
      - {name: description, label: Description, widget: text}
      - {name: image, label: Photo, widget: image, required: false}
      - {name: email, label: Email, widget: string, required: false}
      - {name: phone, label: Phone, widget: string, required: false}
      - {name: order, label: Order, widget: number, default: 0}
