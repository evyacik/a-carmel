title: אודות כרמל
subtitle: מובילים את תחום ההנדסה והבנייה בישראל מאז 1995
story_title: מצוינות בבנייה כבר 30 שנה
content: >
  כרמל בנייה ותשתיות הוקמה בשנת 1995 מתוך חזון ברור - להיות החברה המובילה בתחום
  ההנדסה האזרחית והבנייה בישראל. לאורך השנים, השתתפנו בפרויקטים מורכבים ומאתגרים
  שעיצבו את פני הארץ.


  אנו מתמחים בשני תחומים עיקריים: פרויקטי תשתית ענק כמו גשרים, כבישים מהירים
  ומגדלי ענק, ומנגד - בנייה פרטית יוקרתית של בתים ווילות ברמה הגבוהה ביותר.


  הצוות שלנו מונה למעלה מ-200 מהנדסים, אדריכלים ופועלים מיומנים, כולם מחויבים
  למצוינות, בטיחות וחדשנות.
